<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanByte</title>
    <link rel="icon" type="image/png" href="src/cleanbyte-logo-transparent-1.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- CSS Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <nav>
            <section id="business-name">
                <span>CleanByte</span>
            </section>
            <section id="nav-links">
                <span class="nav-links" id="nav-home">Home</span>
                <span class="nav-links" id="nav-services">Services</span>
                <span class="nav-links" id="nav-about">About Us</span>
                <span class="nav-links" id="nav-contact">Contact Us</span>
            </section>
            <section id="wrapper-book-now">
                <a class="book-now-light" id="nav-book-now" href="google.com">
                    <span>Book Now!</span>
                </a>
            </section>
        </nav>
    </header>
    <main>
        <section id="hero">
            <div class="content">
                <h1>Give your laptop<br>a fresh start.</h1>
                <p>Eliminate internal dust, prevent overheating &<br>
                    boost performance.</p>
            </div>
            <div id="hero-buttons">
                <a class="book-now-dark" href="google.com">
                    <span>Book Now!</span>
                </a>
                <a class="hero-button" href="google.com">
                    <span>Contact Us</span>
                </a>
            </div>
            <div id="illustration">
                <img id="large" src="src/hero-illustration-large.png"
                    alt="hero section illustration with clean byte logo">
                <img id="small" src="src/hero-illustration-small.png"
                    alt="hero section illustration with clean byte logo">
            </div>
        </section>
        <section id="services"></section>
        <section id="about"></section>
        <section id="contact"></section>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
